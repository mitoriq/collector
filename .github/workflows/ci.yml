name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Verify modules
        run: go mod verify

      - name: Check module lock drift
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check third-party notice drift
        run: bash scripts/check-third-party-notices.sh

      - name: Check formatting
        run: |
          git ls-files -z -- '*.go' | xargs -0 gofmt -w
          git diff --exit-code

      - name: Test
        run: go test ./...

      - name: Test installer
        run: sh scripts/install.test.sh

      - name: Build
        run: go build -o "$RUNNER_TEMP/mitoriq-collector" ./cmd/mitoriq-collector

      - name: Audit Go dependencies
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          repo-checkout: false
          go-package: ./...
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: check

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o "$env:RUNNER_TEMP/mitoriq-collector.exe" ./cmd/mitoriq-collector
